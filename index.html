    <script>
        // 면접 Q&A 목업 데이터
        const interviewData = {
            dram: {
                title: "DRAM",
                subtitle: "가장 기본적인 메모리 반도체. 설계 직무 기준의 파라미터 및 동작 속도 제어를 학습하세요.",
                icon: "ph-memory",
                questions: [
                    // 1. DRAM 구조 및 동작원리
                    { q: "DRAM의 1T1C 구조와 동작 원리를 설명해주세요.", a: "DRAM은 <strong>1T1C 구조</strong>로, <strong>워드라인(WL)</strong>은 트랜지스터 스위치를 제어하고, <strong>비트라인(BL)</strong>은 전하를 이동시키는 데이터 입출력 경로 역할을 하며, <strong>커패시터(Cs)</strong>는 전하 축적 유무에 따라 <strong>디지털 데이터 '1'과 '0'을 구분하여 저장</strong>합니다. <strong>Read 동작</strong> 시에는 커패시터 전하가 비트라인과 <strong>전하 분배(Charge Sharing)</strong>되어 미세한 전압 차이를 형성하고, <strong>Write 동작</strong> 시에는 비트라인에 인가된 강한 VDD/GND 전위로 커패시터를 <strong>강제 충방전시켜 데이터를 기록</strong>합니다. 설계 관점에서는 고집적화에 따라 셀 면적이 줄어들어 <strong>정전용량(Cs)이 감소</strong>하고 누설 전류로 데이터가 사라지는 한계가 있습니다. 이를 극복하고자 유전율이 높은 <strong>High-k 유전체</strong>를 도입하고, 게이트를 매립해 <strong>유효 채널 경로를 길게 확보하는 BCAT 구조</strong>를 적용하고 있습니다." },
                    
                    // 2. DRAM 주요 동작들
                    { q: "Sense Amplifier의 역할에 대해 설명해보세요.", a: "Sense Amplifier(S/A)는 DRAM 셀에서 읽어낸 비트라인의 <strong>미세한 전압 차이를 VDD와 VSS 레벨로 빠르게 증폭</strong>하여 데이터를 명확히 판별하는 회로입니다. 읽기 동작 시 비트라인과 셀 커패시터 간의 <strong>전하 분배(Charge Sharing)</strong>가 일어나면 비트라인 쌍에 아주 작은 전압 차가 발생하며, S/A가 이를 신속하게 감지 및 증폭하여 데이터 손실을 막고 열려 있는 셀 데이터를 재기록합니다. 설계 시에는 S/A 구성 트랜지스터들의 문턱 전압 불일치(Vth mismatch)로 인한 센싱 에러를 예방하는 것이 가장 중요하며, 이를 해결하기 위해 오프셋을 사전에 보상해 주는 <strong>오프셋 제거(Offset Cancellation) 회로</strong>를 설계에 적용합니다." },
                    { q: "DRAM의 주요 동작 시퀀스(Active - Read/Write - Precharge)의 핵심 제어 흐름을 설명해 주세요.", a: "DRAM의 동작은 <strong>Active, Read/Write, Precharge 단계</strong>로 순차 제어됩니다. <strong>Active</strong> 단계에서는 행 주소 입력 후 워드라인을 켜 셀의 전하를 비트라인과 분배하는 <strong>Charge Sharing</strong>을 유도하고, 센스앰프(S/A)를 켜 전위차를 증폭 및 복구합니다. <strong>Read/Write</strong> 단계에서는 열 선택 선(CSL)을 켜 S/A에 래치된 데이터를 I/O 라인으로 전송하거나 데이터를 기록합니다. 마지막 <strong>Precharge</strong> 단계에서는 워드라인을 차단해 셀을 격리하고, 이퀄라이저 회로를 구동해 비트라인 쌍을 <strong>Half-VDD(VDD/2) 전위로 등전위화</strong>하여 다음 동작을 대기합니다." },
                    { q: "DRAM의 tRCD, tRP, tCL 파라미터가 회로 설계적 측면에서 의미하는 바는 무엇인가요?", a: "<strong>tRCD</strong>는 워드라인이 켜지고 비트라인 센스앰프가 활성화되어 읽기 명령을 수행할 수 있을 때까지의 지연 시간으로, 워드라인 배선의 저항/캐패시턴스(RC) 지연 감소가 설계 관건입니다. <strong>tRP</strong>는 사용한 뱅크를 닫고 비트라인 전압을 VDD의 절반으로 초기화하는 프리차지 시간이며, 프리차지 회로의 충방전 속도에 영향받습니다. <strong>tCL</strong>은 읽기 명령 인가 후 첫 데이터가 외부 핀으로 출력될 때까지의 대기 시간입니다. 데이터 경로의 지연 시간을 최소화하기 위해 고속 리피터와 스큐를 조율하는 <strong>DLL(Delay Locked Loop) 설계 최적화</strong>가 메인 설계 기법입니다." },
                    
                    // 3. DRAM 트러블슈팅
                    { q: "DRAM에서 Refresh가 필요한 이유는 무엇인가요?", a: "DRAM의 데이터 저장소인 커패시터는 시간이 지남에 따라 <strong>누설 전류로 인해 저장된 전하를 점차 상실</strong>하게 됩니다. 이로 인해 데이터를 오인식하는 오류가 생기므로, 데이터가 사라지기 전 주기적으로 원래 데이터를 다시 읽고 보강해 주는 <strong>Refresh 동작이 필수적</strong>입니다. 설계 엔지니어는 누설 전류 경로를 최소화하는 레이아웃을 고안하고, 전력 소모를 줄이기 위해 셀의 온도 변화에 따라 리프레시 주기를 유연하게 제어하는 <strong>PASR(Partial Array Self Refresh) 회로 기법</strong> 등을 탑재하여 효율성을 높입니다." },
                    { q: "DRAM 캐패시터 용량(Cs) 확보를 위한 기술적 대책은 무엇인가요?", a: "DRAM의 미세화 공정이 진행될수록 커패시터 면적이 좁아져 정전용량(Cs)이 감소하므로, 충분한 센싱 마진을 얻기 위한 용량 확보가 필수적입니다. 이를 극복하기 위해 물리적 표면적을 늘릴 수 있도록 실린더(Cylinder) 또는 필라(Pillar) 형태의 수직 구조를 도입하고 <strong>종횡비(Aspect Ratio)를 극대화</strong>합니다. 또한, 기존 유전체인 산화막 대신 유전율이 매우 높은 <strong>High-k 금속 산화물(ZrO2, Al2O3)</strong> 기반의 다층 박막 구조를 활용합니다. 설계단에서는 커패시터 전하 누설을 줄이기 위해 전원 라인의 노이즈를 필터링하고 워드라인 부스팅 레벨을 안정적으로 공급하는 레귤레이터 회로 설계를 병행합니다." },
                    { q: "Row Hammer(로우 해머) 현상과 대응 방안은 무엇인가요?", a: "로우 해머는 특정 워드라인(Aggressor Row)을 매우 빠른 속도로 연속해서 활성화할 경우 <strong>인접한 워드라인(Victim Row) 셀 커패시터의 전하가 누설되어 데이터가 깨지는 불량 현상</strong>입니다. 기생 커패시턴스 결합이나 전하 포획 등이 원인입니다. 회로 설계적 대응 방안으로는 메모리 내부 컨트롤러가 워드라인 활성화 횟수를 모니터링하여 위험 수치에 도달하면 주변 인접 행들을 집중적으로 강제 리프레시해 주는 <strong>TRR(Target Row Refresh) 기술</strong>을 칩 내부에 집적합니다. 또한 셀 간 분리 영역인 소자 격리막(STI) 설계의 기생 정전용량 결합을 줄이는 레이아웃을 고안합니다." },
                    
                    // 4. DRAM 트레이드오프
                    { q: "DRAM 셀 및 회로 설계 시 속도(tRCD/tRP) 향상과 전력/노이즈 간의 트레이드오프 관계는 무엇이며 이를 어떻게 극복하나요?", a: "DRAM의 동작 속도(tRCD, tRP)를 높이기 위해 워드라인과 비트라인을 빠르게 충방전시키면, <strong>Peak 전류 급증에 따른 전원 노이즈(IR Drop) 및 신뢰성 저하와 트레이드오프 관계</strong>를 가집니다. RC 지연을 줄이려 드라이버 소자가 키우면, 순간적으로 과도한 전류가 흘러 공급 전압을 떨어뜨려 주변 회로의 오동작을 유발합니다. 이를 극복하기 위해 설계 시 워드라인의 동작 타이밍을 다단계로 미세하게 분산 구동하는 <strong>구간 제어 및 분할 드라이버 기법</strong>을 적용합니다. 또한 어레이 내부 전원 배선에 <strong>디커플링 커패시터(Decap)</strong>를 분산 배치하여 스위칭 노이즈 마진을 확보함으로써 속도와 전력 안정성을 동시 충족합니다." },
                    
                    // 5. SRAM 구조 및 동작원리
                    { q: "SRAM 셀의 기본 구조(6T 구조)와 Read/Write 동작 원리를 설명해 주세요.", a: "SRAM 셀은 <strong>2개의 풀업, 2개의 풀다운, 2개의 패스게이트 트랜지스터로 구성된 6T 구조</strong>를 가집니다. <strong>Read 동작</strong> 시에는 비트라인 쌍을 VDD로 프리차지한 후 워드라인을 활성화하며, 셀 내부 '0'이 저장된 노드와 연결된 비트라인 전위가 패스게이트를 통해 방전되면서 생기는 전압 차를 감지해 읽습니다. <strong>Write 동작</strong> 시에는 비트라인 쌍에 강제로 서로 반대되는 레벨을 인가하고 패스게이트를 켜서 래치의 전기적 평형 상태를 깨뜨려 데이터를 플립시킵니다. 설계 시에는 저전압 조건에서 데이터가 지워지는 <strong>홀드 마진(Hold Margin) 저하를 방지</strong>하기 위해 트랜지스터 간 문턱 전압 일치(Mismatch) 보정 레이아웃을 필수적으로 적용합니다." },
                    
                    // 6. SRAM 트러블슈팅
                    { q: "SRAM 셀 설계 시 발생할 수 있는 'Half-Select(하프 셀렉트)' 불량 현상과 회로적 트러블슈팅 방안을 설명해 주세요.", a: "SRAM의 하프 셀렉트 현상은 쓰기 동작 시 선택된 행의 비선택 셀들이 <strong>워드라인만 활성화된 채 읽기 스트레스를 받아 데이터가 원치 않게 반전되는 불량 현상</strong>입니다. 비트라인이 VDD로 유지된 상태에서 워드라인이 켜지면 사실상 리드 동작이 수행되어 셀 내부 데이터가 플립될 위험에 노출됩니다. 이를 트러블슈팅하기 위해 설계단에서는 동일 행의 셀들을 물리적으로 분산시키는 <strong>열 인터리빙(Column Interleaving) 레이아웃</strong>을 적용합니다. 또한, 쓰기 시 비선택 열의 비트라인 전위를 순간적으로 보상해주거나 워드라인 전압을 미세하게 클램핑해주는 <strong>디스터번스 방지 어시스트 회로</strong>를 집적하여 오동작을 방지합니다." },
                    
                    // 7. SRAM 트레이드오프

            nand: {

                icon: "ph-stack",
                questions: [
                    { q: "NAND Flash의 쓰기(Program)와 지우기(Erase) 동작 원리는?", a: "NAND 플래시는 절연막 내부의 <strong>차지 트랩 레이어(CTF)에 전자를 가두거나 방출</strong>하여 데이터를 저장합니다. 쓰기 동작은 선택된 제어 게이트에 높은 고전압(약 20V)을 가해 채널의 전자가 터널 산화막을 통과해 트랩층으로 들어오게 만드는 <strong>FN 터널링 효과</strong>를 이용합니다. 지우기는 기판(Substrate)에 높은 전압을 인가하고 게이트를 0V로 두어 전자를 다시 기판으로 방출시킵니다. 설계 시에는 미세한 전압 조절이 필수적이므로 고전압을 생성하는 차지 펌프(Charge Pump)와 이를 정밀하게 쪼개어 단계적으로 높여 전압을 인가하는 <strong>ISPP 알고리즘 제어 회로 설계</strong>가 핵심입니다." },

                questions: [
                    { q: "SKMS(SK Management System)란 무엇이며, VWBE의 뜻은?", a: "SKMS는 SK그룹 고유의 경영 철학과 기법을 체체화한 헌장입니다. <strong>VWBE</strong>는 'Voluntarily, Willingly, Brain Engagement'의 약자로, 구성원이 <strong>자발적(Voluntarily)이고 의욕적(Willingly)으로 두뇌를 활용(Brain Engagement)하여 일하는 태도</strong>를 의미합니다. 이를 통해 SUPEX(Super Excellent, 인간의 능력으로 도달할 수 있는 최고 수준)를 추구합니다. 엔지니어로서 기술적 한계를 극복하고 최적의 설계를 유도하기 위해 집요하게 파고드는 태도 역시 이에 부합합니다." },
                    { q: "협업 중 팀원 간의 의견 충돌이나 갈등을 조율했던 경험은?", a: "갈등 조율의 핵심은 상호 경청과 객관적 데이터를 기반으로 공통의 최선책을 찾는 것입니다. 과거 프로젝트 설계 과정에서 전력 소모 저감과 동작 속도 확보를 두고 우선순위 충돌이 있었습니다. 각자의 설계를 시뮬레이션 수치로 정량화하여 비교 테이블로 정리했고, 동작 빈도가 낮지만 누설 전류가 많은 블록에만 <strong>Multi-Vt를 타협 적용하는 대안을 제안</strong>하여 양쪽 요구 조건을 만족시켰고 프로젝트 목표를 성공적으로 조율하여 완수했습니다." },
                    { q: "어려운 과제를 만나 한계를 극복하고 도전했던 경험은?", a: "한계 극복을 위해서는 기존 방식의 틀을 깨는 집요함이 필요합니다. 과거 반도체 회로 설계 과제 중 동작 주파수는 충족했으나 가이드라인 초과 전력 소모 한계에 부딪힌 적이 있습니다. 단순히 트랜지스터 크기를 조정하는 방식 대신, 스위칭 전류를 줄이기 위한 클럭 트리 분기 설계와 <strong>로컬 클럭 게이팅 회로 구조</strong>를 새롭게 학습해 적용했습니다. 배선 라우팅을 수차례 재수정한 끝에 <strong>전력 소모를 15% 감축</strong>시켜 극복에 성공했습니다." }
                ]
            }
        };

        let currentTab = 'dram';

        function renderNav() {
            const desktopNav = document.getElementById('desktop-nav');
            const mobileNav = document.getElementById('mobile-nav');
            
            desktopNav.innerHTML = '';
            mobileNav.innerHTML = '';

            Object.keys(interviewData).forEach(key => {
                const isSelected = key === currentTab;
                const data = interviewData[key];

                // 데스크탑 메뉴 아이템 렌더링
                const desktopBtn = document.createElement('button');
                desktopBtn.className = `flex items-center gap-3 px-4 py-3.5 rounded-[16px] transition-all text-left w-full ${isSelected ? 'bg-toss-blueBg text-toss-blue font-bold' : 'text-toss-text hover:bg-toss-bg font-medium'}`;
                desktopBtn.onclick = () => switchTab(key);
                desktopBtn.innerHTML = `
                    <i class="ph ${data.icon} text-xl ${isSelected ? 'text-toss-blue' : 'text-toss-subtext'}"></i>
                    <span class="text-[16px]">${data.title}</span>
                `;
                desktopNav.appendChild(desktopBtn);

                // 모바일 메뉴 아이템 렌더링 (Toss 스타일 칩셋 버튼)
                const mobileBtn = document.createElement('button');
                mobileBtn.className = `whitespace-nowrap px-5 py-2.5 rounded-full text-[15px] transition-all ${isSelected ? 'bg-toss-text text-toss-white font-bold shadow-sm' : 'bg-toss-bg text-toss-subtext font-medium'}`;
                mobileBtn.onclick = () => switchTab(key);
                mobileBtn.innerHTML = data.title;
                mobileNav.appendChild(mobileBtn);
            });
        }

        function renderContent() {
            const data = interviewData[currentTab];
            
            // 헤더 렌더링
            const header = document.getElementById('page-header');
            header.innerHTML = `
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center">
                        <i class="ph ${data.icon} text-2xl text-toss-text"></i>
                    </div>
                    <h2 class="text-[28px] md:text-[32px] font-bold text-toss-text">${data.title}</h2>
                </div>
                <p class="text-[15px] md:text-[16px] text-toss-subtext mt-3 leading-relaxed">${data.subtitle}</p>
            `;

            // Q&A 리스트 렌더링
            const container = document.getElementById('qa-container');
            container.innerHTML = '';

            data.questions.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[24px] p-5 md:p-7 shadow-toss cursor-pointer group active:scale-[0.99] transition-transform";
                card.onclick = function() {
                    const content = this.querySelector('.accordion-content');
                    const chevron = this.querySelector('.chevron');
                    const isOpen = content.classList.contains('open');
                    
                    // 토스 스타일: 클릭 시 다른 아코디언은 닫히지 않고 독립적으로 동작
                    if(isOpen) {
                        content.classList.remove('open');
                        chevron.classList.remove('open');
                    } else {
                        content.classList.add('open');
                        chevron.classList.add('open');
                    }
                };

                card.innerHTML = `
                    <div class="flex gap-4 items-start">
                        <div class="flex-shrink-0 w-8 h-8 rounded-full bg-toss-blueBg text-toss-blue flex items-center justify-center font-bold text-[15px]">
                            Q
                        </div>
                        <div class="flex-1 pt-1">
                            <h3 class="text-[17px] md:text-[19px] font-bold text-toss-text leading-snug tracking-tight pr-6">${item.q}</h3>
                            <div class="accordion-content">
                                <div class="bg-toss-bg rounded-[16px] p-5 mt-2">
                                    <div class="flex gap-3">
                                        <span class="text-toss-blue font-bold">A.</span>
                                        <p class="text-[15px] md:text-[16px] text-[#333D4B] leading-relaxed break-keep">${item.a}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex-shrink-0 pt-1">
                            <i class="ph ph-caret-down text-xl text-toss-subtext chevron"></i>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            renderNav();
            
            // 컨텐츠 페이드 효과
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(10px)';
            main.style.transition = 'all 0.2s ease-out';
            
            setTimeout(() => {
                renderContent();
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 200);
        }

        function updateDday() {
            const today = new Date();
            const d1 = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            const d2 = new Date(today.getFullYear(), 6, 12); // 7월 12일 (0-indexed: 6)
            
            const diffTime = d2 - d1;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let dDayStr = '';
            if (diffDays > 0) {
                dDayStr = `D-${diffDays}`;
            } else if (diffDays === 0) {
                dDayStr = 'D-Day';
            } else {
                dDayStr = `D+${Math.abs(diffDays)}`;
            }
            
            const dDayEl = document.getElementById('d-day-text');
            if (dDayEl) {
                dDayEl.innerText = dDayStr;
            }
        }

        // 초기화
        window.onload = () => {
            renderNav();
            renderContent();
            updateDday();
        };
    </script>
</body>
</html>
